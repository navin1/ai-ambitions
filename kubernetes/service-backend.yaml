# Routes through the forgerock-ig sidecar (port 8080), not directly to the app
# container (port 8000) — see the gap note in deployment-backend.yaml. IG's
# route config (kubernetes/backend-config.yaml) proxies validated requests on
# to http://localhost:8000 inside the pod.
apiVersion: v1
kind: Service
metadata:
  name: ai-ambitions-backend
  namespace: ai-ambitions
spec:
  type: ClusterIP
  selector:
    app: ai-ambitions-backend
  ports:
  - name: http
    port: 8000
    targetPort: ig-http
    protocol: TCP
