# ── Kubernetes ServiceAccount bound to a GCP service account via Workload Identity ──
# Prerequisites:
#   1. Create the GCP SA:
#      gcloud iam service-accounts create ai-ambitions-app \
#        --project=PROJECT_ID
#   2. Grant BigQuery permissions on the SA:
#      gcloud projects add-iam-policy-binding PROJECT_ID \
#        --member="serviceAccount:ai-ambitions-app@PROJECT_ID.iam.gserviceaccount.com" \
#        --role="roles/bigquery.dataViewer"
#      gcloud projects add-iam-policy-binding PROJECT_ID \
#        --member="serviceAccount:ai-ambitions-app@PROJECT_ID.iam.gserviceaccount.com" \
#        --role="roles/bigquery.jobUser"
#      # If using Vertex AI (for chat/NL features):
#      gcloud projects add-iam-policy-binding PROJECT_ID \
#        --member="serviceAccount:ai-ambitions-app@PROJECT_ID.iam.gserviceaccount.com" \
#        --role="roles/aiplatform.user"
#   3. Allow the K8s SA to impersonate the GCP SA:
#      gcloud iam service-accounts add-iam-policy-binding \
#        ai-ambitions-app@PROJECT_ID.iam.gserviceaccount.com \
#        --role="roles/iam.workloadIdentityUser" \
#        --member="serviceAccount:PROJECT_ID.svc.id.goog[ai-ambitions/ai-ambitions-ksa]"
#   4. Enable Workload Identity on the cluster (if not already):
#      gcloud container clusters update CLUSTER \
#        --workload-pool=PROJECT_ID.svc.id.goog \
#        --region=REGION

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-ambitions-ksa
  namespace: ai-ambitions
  annotations:
    iam.gke.io/gcp-service-account: ai-ambitions-app@PROJECT_ID.iam.gserviceaccount.com
