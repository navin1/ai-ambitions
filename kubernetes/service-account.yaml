# ── Kubernetes ServiceAccount bound to a GCP service account via Workload Identity ──
# Prerequisites:
#   1. Create the GCP SA:
#      gcloud iam service-accounts create ai-ambitions-app \
#        --project=mygclearning
#   2. Grant BigQuery permissions on the SA — jobUser project-wide (job
#      execution isn't a dataset resource), dataEditor scoped to just the
#      ai_ambitions dataset (dataViewer is read-only and NOT sufficient — the
#      admin Excel-upload pipeline creates a staging table and runs DML;
#      see backend/bigquery_client.py::replace_periods):
#      gcloud projects add-iam-policy-binding mygclearning \
#        --member="serviceAccount:ai-ambitions-app@mygclearning.iam.gserviceaccount.com" \
#        --role="roles/bigquery.jobUser"
#      bq add-iam-policy-binding \
#        --member="serviceAccount:ai-ambitions-app@mygclearning.iam.gserviceaccount.com" \
#        --role="roles/bigquery.dataEditor" \
#        mygclearning:ai_ambitions
#      # If using Vertex AI (for chat/NL features):
#      gcloud projects add-iam-policy-binding mygclearning \
#        --member="serviceAccount:ai-ambitions-app@mygclearning.iam.gserviceaccount.com" \
#        --role="roles/aiplatform.user"
#      # For the admin file-upload pipeline, scoped to just that bucket
#      # (input/ -> archive/success|failure/ move — create/copy/delete objects):
#      gcloud storage buckets add-iam-policy-binding gs://YOUR_UPLOAD_BUCKET \
#        --member="serviceAccount:ai-ambitions-app@mygclearning.iam.gserviceaccount.com" \
#        --role="roles/storage.objectAdmin"
#   3. Allow the K8s SA to impersonate the GCP SA:
#      gcloud iam service-accounts add-iam-policy-binding \
#        ai-ambitions-app@mygclearning.iam.gserviceaccount.com \
#        --role="roles/iam.workloadIdentityUser" \
#        --member="serviceAccount:mygclearning.svc.id.goog[ai-ambitions/ai-ambitions-ksa]"
#   4. Enable Workload Identity on the cluster (if not already):
#      gcloud container clusters update CLUSTER \
#        --workload-pool=mygclearning.svc.id.goog \
#        --region=REGION

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-ambitions-ksa
  namespace: ai-ambitions
  annotations:
    iam.gke.io/gcp-service-account: ai-ambitions-app@mygclearning.iam.gserviceaccount.com
