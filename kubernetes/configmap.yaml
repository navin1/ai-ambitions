apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-ambitions-config
  namespace: ai-ambitions
data:
  # ── BigQuery ──────────────────────────────────────────────────────────────────
  BIGQUERY_PROJECT_ID: "mygclearning"        # GCP project that owns the BQ dataset
  BIGQUERY_DATASET: "ai_ambitions"
  BQ_JOB_PROJECT_ID: "mygclearning"          # Project billed for BQ jobs (often same as above)

  # ── Vertex AI / Gemini (required only when AI features are enabled) ──────────
  VERTEX_AI_PROJECT: "mygclearning"
  VERTEX_AI_LOCATION: "us-central1"
  GEMINI_MODEL: "gemini-2.5-flash"

  # ── ForgeRock Identity Gateway ────────────────────────────────────────────────
  # These are read by the IG sidecar container (not the app). The app only reads
  # FORGEROCK_EMAIL_HEADER / FORGEROCK_USERNAME_HEADER / FORGEROCK_GROUPS_HEADER
  # to know which headers IG will inject after session validation.
  FORGEROCK_AM_URL: ""                       # e.g. https://am.example.com/am
  FORGEROCK_AM_REALM: "/"                    # AM realm (root realm by default)
  FORGEROCK_AM_COOKIE_NAME: "iPlanetDirectoryPro"  # AM SSO cookie name
  FORGEROCK_EMAIL_HEADER: "x-fr-email"       # header IG injects with user email
  FORGEROCK_USERNAME_HEADER: "x-fr-username" # header IG injects with username/uid
  FORGEROCK_GROUPS_HEADER: "x-fr-groups"     # header IG injects with comma-separated AD group names

  # ── AD-group-based roles ──────────────────────────────────────────────────────
  # FORGEROCK_AM_GROUPS_ATTRIBUTE is the AM session property holding AD group
  # membership (used by the app when it looks up AM sessions itself — see
  # backend/auth.py::am_session_info). FORGEROCK_ADMIN_GROUP is the AD group
  # name that grants the "admin" role. FORGEROCK_ACCESS_GROUP, if set, is
  # required just to reach the app at all (admins always pass regardless).
  # Fill in once the corresponding AD group(s) exist — until then every
  # authenticated user resolves to the "user" role and access is unrestricted.
  FORGEROCK_AM_GROUPS_ATTRIBUTE: "memberOf"
  FORGEROCK_ADMIN_GROUP: ""                  # e.g. "AI-Ambitions-Admins"
  FORGEROCK_ACCESS_GROUP: ""                 # e.g. "AI-Ambitions-Users"

  # ── Admin file upload / BigQuery load (GCS) ───────────────────────────────────
  # Bucket the /api/admin/upload endpoint (admin role only) writes to and reads
  # from (input/ landing, archive/success|failure/ — see backend/routes/admin.py).
  # The pod's Workload Identity service account needs:
  #   - roles/storage.objectAdmin scoped to this bucket (create/copy/delete
  #     objects for the input -> archive move)
  #   - roles/bigquery.dataEditor scoped to the BIGQUERY_DATASET above (creates
  #     a staging table, runs DELETE+INSERT DML, drops the staging table —
  #     roles/bigquery.dataViewer is read-only and NOT sufficient)
  # See deploy-gke.sh for the actual IAM bindings.
  GCS_PROJECT_ID: "mygclearning"              # defaults to BIGQUERY_PROJECT_ID if unset
  GCS_UPLOAD_BUCKET: ""                       # e.g. "ai-ambitions-uploads"
  GCS_UPLOAD_PREFIX: "ai_ambitions"           # folder prefix inside the bucket

  LOG_LEVEL: "INFO"
