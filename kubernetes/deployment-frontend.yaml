apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ambitions-frontend
  namespace: ai-ambitions
  labels:
    app: ai-ambitions-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ambitions-frontend
  template:
    metadata:
      labels:
        app: ai-ambitions-frontend
    spec:
      containers:
      - name: ai-ambitions-frontend
        image: us-central1-docker.pkg.dev/mygclearning/ai-ambitions/ai-ambitions-frontend:latest
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
