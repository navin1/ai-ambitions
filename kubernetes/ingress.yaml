# Prerequisites:
#   1. Reserve a static IP:
#      gcloud compute addresses create ai-ambitions-ip --global
#   2. Create a Google-managed SSL certificate:
#      gcloud compute ssl-certificates create ai-ambitions-cert \
#        --domains=your-domain.example.com --global
#   3. Ensure ForgeRock AM is reachable from within the GKE cluster
#      (VPC peering, Private Service Connect, or public endpoint).
#   4. Point your DNS A record to the reserved IP.
#
# Path-based routing — /api/* goes to the backend Service, everything else
# goes to the frontend Service. Both sit behind the same host/IP, so the
# frontend's relative-path API calls (baseURL: '/api') keep working unchanged
# with no CORS configuration needed.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ambitions
  namespace: ai-ambitions
  annotations:
    kubernetes.io/ingress.global-static-ip-name: ai-ambitions-ip
    networking.gke.io/managed-certificates: ai-ambitions-cert
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - http:
      paths:
      - path: /api/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: ai-ambitions-backend
            port:
              number: 8000
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: ai-ambitions-frontend
            port:
              number: 8080
