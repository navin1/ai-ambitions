# Prerequisites:
#   1. Reserve a static IP:
#      gcloud compute addresses create ai-ambitions-ip --global
#   2. Create a Google-managed SSL certificate:
#      gcloud compute ssl-certificates create ai-ambitions-cert \
#        --domains=your-domain.example.com --global
#   3. Point your DNS A record to the reserved IP address.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-ambitions
  namespace: ai-ambitions
  annotations:
    kubernetes.io/ingress.global-static-ip-name: ai-ambitions-ip
    networking.gke.io/managed-certificates: ai-ambitions-cert
    kubernetes.io/ingress.class: "gce"
spec:
  defaultBackend:
    service:
      name: ai-ambitions
      port:
        number: 80
