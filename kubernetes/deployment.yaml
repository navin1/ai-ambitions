apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ambitions
  namespace: ai-ambitions
  labels:
    app: ai-ambitions
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ambitions
  template:
    metadata:
      labels:
        app: ai-ambitions
    spec:
      serviceAccountName: ai-ambitions-ksa
      containers:
      - name: ai-ambitions
        image: us-central1-docker.pkg.dev/mygclearning/ai-ambitions/ai-ambitions:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: ai-ambitions-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
