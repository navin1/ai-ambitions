# Serves the built React SPA only. /api/* routing to the backend is handled
# by the GKE Ingress (path-based rule — see kubernetes/ingress.yaml), not by
# this container, so the frontend's existing relative-path API calls
# (baseURL: '/api') still work unchanged with no proxy logic needed here.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
