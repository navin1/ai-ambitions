# Proxies /api/* to the backend Service via in-cluster DNS so the frontend's
# existing relative-path calls (axios baseURL: '/api') work unchanged.
# Update the backend host below if your Service/namespace names differ —
# see kubernetes/service-backend.yaml.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://ai-ambitions-backend.ai-ambitions.svc.cluster.local:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        proxy_pass http://ai-ambitions-backend.ai-ambitions.svc.cluster.local:8000/favicon.ico;
    }

    # SPA fallback — client-side routes resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
